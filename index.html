<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>AcadFlow — Academic Management System</title>
  <meta name="description" content="AcadFlow is a real-time school portal for managing grades, attendance, activities, quizzes, online classes, and messaging in one clean, fast workspace." />
  <meta name="author" content="Mark Arnold Galvez" />
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Open Graph / social sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AcadFlow" />
  <meta property="og:title" content="AcadFlow — Academic Management System" />
  <meta property="og:description" content="Manage grades, attendance, activities, quizzes, and messaging in real time." />
  <meta property="og:image" content="/icon-512.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="AcadFlow — Academic Management System" />
  <meta name="twitter:description" content="Manage grades, attendance, activities, quizzes, and messaging in real time." />
  <meta name="twitter:image" content="/icon-512.png" />

  <!-- PWA: installable + offline shell -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1a4a9e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AcadFlow" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- SheetJS for Excel export (CDN — accessed as window.XLSX) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- jsPDF + AutoTable for PDF export (CDN — accessed as window.jspdf) -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
