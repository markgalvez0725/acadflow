<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>AcadFlow - Academic Management System</title>
  <meta name="description" content="AcadFlow is a real-time school portal for managing grades, attendance, activities, quizzes, online classes, and messaging in one clean, fast workspace." />
  <meta name="author" content="Mark Arnold Galvez" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

  <!-- Open Graph / social sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AcadFlow" />
  <meta property="og:title" content="AcadFlow - Academic Management System" />
  <meta property="og:description" content="Manage grades, attendance, activities, quizzes, and messaging in real time." />
  <meta property="og:image" content="/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AcadFlow - Academic Management System" />
  <meta name="twitter:description" content="Manage grades, attendance, activities, quizzes, and messaging in real time." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- PWA: installable + offline shell -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1c2440" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AcadFlow" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Lexend:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- SheetJS for Excel export (CDN - accessed as window.XLSX) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- ExcelJS for roster export dropdowns (data-validation; SheetJS can't write them) -->
  <script defer src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <!-- jsPDF + AutoTable for PDF export (CDN - accessed as window.jspdf) -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <!-- QR code generator for attendance check-in (CDN - accessed as window.QRCode) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- QR scanner/decoder for live-quiz join (CDN - accessed as window.jsQR) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <!-- face-api.js (maintained @vladmandic fork) for on-device Face ID enrollment +
       password reset (CDN - accessed as window.faceapi; ML models are lazy-loaded
       from the CDN model dir only when the camera flow is opened). -->
  <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/dist/face-api.js"></script>

  <!-- Instant boot splash: critical inline CSS so the branded loading screen
       paints on the FIRST byte at cold launch / installed-app start, before the
       JS bundle and globals.css load. React swaps in an identical <LoadingScreen>
       (same navy + lockup) once it mounts, so the hand-off is seamless. -->
  <style>
    #boot-splash{position:fixed;inset:0;z-index:99999;background:#1c2440;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px;text-align:center;font-family:'Lexend',system-ui,sans-serif}
    #boot-splash .boot-glow{position:absolute;inset:0;pointer-events:none;opacity:.5;background:radial-gradient(circle at 26% 18%,rgba(124,108,242,.45) 0,transparent 42%),radial-gradient(circle at 82% 86%,rgba(80,70,228,.4) 0,transparent 40%)}
    #boot-splash .boot-lockup{display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;z-index:1;animation:bootFloat 3s ease-in-out infinite}
    #boot-splash .boot-cap{width:min(96px,26vw);height:auto;display:block;filter:drop-shadow(0 6px 16px rgba(0,0,0,.3))}
    #boot-splash .boot-cap path{animation:bootPop .7s cubic-bezier(.34,1.56,.64,1) both}
    #boot-splash .boot-word{font-family:'Bricolage Grotesque','Plus Jakarta Sans',system-ui,sans-serif;font-weight:800;font-size:clamp(2.1rem,9vw,2.8rem);line-height:1;color:#fff;letter-spacing:-.02em;text-transform:lowercase}
    #boot-splash .boot-tag{font-size:.85rem;color:rgba(255,255,255,.66)}
    #boot-splash .boot-bar{width:150px;height:4px;border-radius:99px;background:rgba(255,255,255,.16);overflow:hidden;position:relative;z-index:1}
    #boot-splash .boot-bar>span{position:absolute;top:0;left:0;height:100%;width:42%;border-radius:99px;background:#7c6cf2;animation:bootSlide 1.25s ease-in-out infinite}
    #boot-splash .boot-hint{font-size:.72rem;color:rgba(255,255,255,.5);letter-spacing:.04em;position:relative;z-index:1}
    @keyframes bootFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes bootPop{0%{opacity:0;transform:scale(.5) rotate(-8deg)}100%{opacity:1;transform:none}}
    @keyframes bootSlide{0%{transform:translateX(-130%)}100%{transform:translateX(330%)}}
    @media (prefers-reduced-motion:reduce){#boot-splash .boot-lockup,#boot-splash .boot-cap path,#boot-splash .boot-bar>span{animation:none}}
  </style>
</head>
<body>
  <div id="root">
    <!-- Painted instantly; React (createRoot) replaces #root's contents on mount. -->
    <div id="boot-splash">
      <div class="boot-glow"></div>
      <div class="boot-lockup">
        <svg class="boot-cap" viewBox="53.9 87.2 179.5 112.8" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AcadFlow"><path fill="#fff" d="M226.61,126.79c-26.98-10.93-53.78-21.8-80.4-32.61-1.36-.55-2.89-.55-4.27,0l-81.19,32.97c-.34.15-.53.51-.42.87.11.4.47.74,1.08.98,26.31,10.66,53.04,21.51,80.15,32.55,1.63.68,3.46.68,5.12.02l34.5-14.01c.3-.13.62.08.62.4v20.49c0,.38-.23.7-.57.85l-35.14,14.27c-1.27.51-2.68.51-3.95,0l-33.91-13.78c-.93-.38-1.55-1.3-1.55-2.31v-10.32c0-.96-.57-1.8-1.42-2.14l-6.96-2.82c-.91-.36-1.38-.06-1.38.91v21.12c0,.89.55,1.72,1.4,2.06l42.65,17.35c2.04.81,4.29.81,6.31,0l42.55-17.28c.98-.4,1.47-1.13,1.47-2.19v-32.74c0-.98-.53-1.85-1.38-2.31-3.8-2.04-6.31-3.04-10.96-1.15-9.26,3.74-19.98,8.09-32.19,13.08-1.63.68-3.5.68-5.14,0l-54.63-22.21c-1.51-.62-1.51-1.21,0-1.83l19.68-8c.87-.34,1.72-.34,2.57,0l35.71,14.52c1.72.7,3.44.68,5.16-.08l7.26-3.21c1.72-.76,1.72-1.51-.02-2.21l-34.05-13.84c-1.61-.66-1.61-1.32,0-1.97l17.62-7.15c2.1-.85,4.2-.85,6.31,0l55.39,22.5c.7.28,1.15.96,1.15,1.7.04,11.61,0,26.43-.11,44.44,0,.41-.09.74-.13,1.12-3.52,1.3-6.03,4.66-6.03,8.63,0,5.1,4.13,9.23,9.23,9.23s9.23-4.13,9.23-9.23c0-4.2-2.82-7.7-6.65-8.82-.1-.77-.16-1.57-.16-2.41-.02-14.8,0-26.26.06-34.37.02-1.13.7-2.14,1.74-2.55l16.09-6.28c.11-.04.21-.11.3-.21.64-.87.38-1.55-.74-2Z"/></svg>
        <div class="boot-word">acadflow</div>
        <div class="boot-tag">Where learning flows.</div>
      </div>
      <div class="boot-bar"><span></span></div>
      <div class="boot-hint">Connecting your campus…</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
