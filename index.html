<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>AcadFlow - Academic Management System</title>
  <meta name="description" content="AcadFlow is a real-time school portal for managing grades, attendance, activities, quizzes, online classes, and messaging in one clean, fast workspace." />
  <meta name="author" content="Mark Arnold Galvez" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

  <!-- Open Graph / social sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AcadFlow" />
  <meta property="og:title" content="AcadFlow - Academic Management System" />
  <meta property="og:description" content="Manage grades, attendance, activities, quizzes, and messaging in real time." />
  <meta property="og:image" content="/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AcadFlow - Academic Management System" />
  <meta name="twitter:description" content="Manage grades, attendance, activities, quizzes, and messaging in real time." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- PWA: installable + offline shell -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#5046e4" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AcadFlow" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- SheetJS for Excel export (CDN - accessed as window.XLSX) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- ExcelJS for roster export dropdowns (data-validation; SheetJS can't write them) -->
  <script defer src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <!-- jsPDF + AutoTable for PDF export (CDN - accessed as window.jspdf) -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <!-- QR code generator for attendance check-in (CDN - accessed as window.QRCode) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- QR scanner/decoder for live-quiz join (CDN - accessed as window.jsQR) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <!-- face-api.js (maintained @vladmandic fork) for on-device Face ID enrollment +
       password reset (CDN - accessed as window.faceapi; ML models are lazy-loaded
       from the CDN model dir only when the camera flow is opened). -->
  <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/dist/face-api.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
