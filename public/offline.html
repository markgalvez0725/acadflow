<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcadFlow — Offline</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: #0b0f1a; color: #e6eaf2; text-align: center; padding: 24px;
    }
    .card {
      max-width: 420px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px; padding: 40px 28px; backdrop-filter: blur(8px);
    }
    img { width: 72px; height: 72px; margin-bottom: 18px; }
    h1 { font-size: 22px; margin: 0 0 8px; background: linear-gradient(135deg,#a78bfa,#5046e4); -webkit-background-clip: text; background-clip: text; color: transparent; }
    p { color: #9aa6bd; font-size: 14px; line-height: 1.6; margin: 0 0 22px; }
    button {
      border: none; cursor: pointer; font: inherit; font-weight: 600; color: #fff;
      background: linear-gradient(135deg,#5046e4,#7c3aed); padding: 11px 22px; border-radius: 12px;
    }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon-192.png" alt="AcadFlow" />
    <h1>You're offline</h1>
    <p>AcadFlow needs a connection to load fresh grades, attendance, and messages. Your saved screens are still available once you reconnect.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
